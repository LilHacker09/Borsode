<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borsode CsomagPont Kft.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#3b82f6',
                        darkbg: '#0f172a',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-darkbg text-white min-h-screen font-sans antialiased selection:bg-brand selection:text-white">
    <nav class="bg-slate-900 border-b border-slate-800 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-box-open text-brand text-3xl"></i>
                <span class="text-2xl font-bold tracking-wider">Borsode<span class="text-brand">Pont.Kft</span></span>
            </div>
            <div class="text-sm text-slate-400">
                <i class="fa-solid fa-server text-green-400 mr-1"></i> Rendszer Online
            </div>
        </div>
    </nav>


    <main class="max-w-6xl mx-auto px-4 py-10 grid md:grid-cols-2 gap-8">
        <div class="bg-slate-800 rounded-2xl p-8 shadow-2xl border border-slate-700">
            <h2 class="text-2xl font-semibold mb-6 flex items-center">
                <i class="fa-solid fa-magnifying-glass mr-3 text-brand"></i> Csomagkövetés
            </h2>
            <div class="flex space-x-3 mb-6">
                <input type="text" id="trackInput" placeholder="pl. BC-123456"
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
                <button onclick="trackPackage()"
                    class="bg-brand hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                    Keresés
                </button>
            </div>
            <div id="trackResult" class="hidden bg-slate-900 rounded-xl p-6 border-l-4 border-brand">
                <p class="text-slate-400 text-sm mb-1">Csomagszám: <span id="resId" class="text-white font-mono"></span>
                </p>
                <p class="text-2xl font-bold text-white mb-2" id="resStatus"></p>
                <div class="mt-4 flex items-center text-sm text-slate-400">
                    <i class="fa-solid fa-user mr-2"></i> Feladó azonosító: <span id="resOwner" class="ml-1"></span>
                </div>
            </div>
            <div id="trackError"
                class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-lg mt-4">
                <i class="fa-solid fa-triangle-exclamation mr-2"></i> Nem található ilyen csomag a rendszerben!
            </div>
        </div>
        <div class="bg-slate-800 rounded-2xl p-8 shadow-2xl border border-slate-700">
            <h2 class="text-2xl font-semibold mb-6 flex items-center">
                <i class="fa-solid fa-sliders mr-3 text-purple-500"></i> Admin Panel
            </h2>
            <div class="mb-8 p-5 bg-slate-900 rounded-xl border border-slate-700">
                <h3 class="text-lg font-medium text-slate-300 mb-4">Új csomag felvétele</h3>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="text" id="newTrackId" placeholder="Csomagszám"
                        class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:border-brand outline-none">
                    <input type="number" id="newOwnerId" placeholder="Tulajdonos ID"
                        class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:border-brand outline-none">
                </div>
                <button onclick="createPackage()"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg text-sm font-semibold transition-colors">
                    <i class="fa-solid fa-plus mr-1"></i> Felvétel a rendszerbe
                </button>
            </div>
            <div class="p-5 bg-slate-900 rounded-xl border border-slate-700">
                <h3 class="text-lg font-medium text-slate-300 mb-4">Státusz frissítése</h3>
                <input type="text" id="updateTrackId" placeholder="Csomagszám"
                    class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 mb-3 text-sm outline-none">

                <select id="updateStatus"
                    class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 mb-3 text-sm outline-none text-white appearance-none">
                    <option value="Feldolgozás alatt">Feldolgozás alatt</option>
                    <option value="Raktárban">Raktárban</option>
                    <option value="Kiszállítás alatt">Kiszállítás alatt</option>
                    <option value="Sikeresen kézbesítve">Sikeresen kézbesítve</option>
                </select>
                <button onclick="updatePackage()"
                    class="w-full bg-purple-600 hover:bg-purple-500 text-white py-2 rounded-lg text-sm font-semibold transition-colors">
                    <i class="fa-solid fa-rotate mr-1"></i> Frissítés (Discord értesítés)
                </button>
            </div>
            <div id="toast"
                class="hidden mt-4 bg-green-900/50 border border-green-500 text-green-200 px-4 py-3 rounded-lg text-center text-sm">
                Művelet sikeresen végrehajtva!
            </div>
        </div>
    </main>
    <script>
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }


        async function trackPackage() {
            const id = document.getElementById('trackInput').value;
            const resDiv = document.getElementById('trackResult');
            const errDiv = document.getElementById('trackError');

            resDiv.classList.add('hidden');
            errDiv.classList.add('hidden');

            if (!id) return;

            try {
                const response = await fetch(`/packages/${id}`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('resId').innerText = data.tracking_number;
                    document.getElementById('resStatus').innerText = data.status;
                    document.getElementById('resOwner').innerText = data.owner_id;


                    const statusEl = document.getElementById('resStatus');
                    statusEl.className = 'text-2xl font-bold mb-2 ' +
                        (data.status.includes('kézbesítve') ? 'text-emerald-400' : 'text-brand');

                    resDiv.classList.remove('hidden');
                } else {
                    errDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Hálózati hiba:", error);
            }
        }
        async function createPackage() {
            const id = document.getElementById('newTrackId').value;
            const ownerId = document.getElementById('newOwnerId').value;

            if (!id || !ownerId) return alert('Tölts ki minden mezőt!');

            const response = await fetch('/packages/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tracking_number: id, owner_id: parseInt(ownerId) })
            });

            if (response.ok) {
                document.getElementById('newTrackId').value = '';
                document.getElementById('newOwnerId').value = '';
                showToast();
            } else {
                alert('Hiba történt a felvételkor! Lehet, hogy ez a csomagszám már létezik.');
            }
        }
        async function updatePackage() {
            const id = document.getElementById('updateTrackId').value;
            const status = document.getElementById('updateStatus').value;

            if (!id) return alert('Írd be a csomagszámot!');

            const response = await fetch(`/packages/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: status })
            });

            if (response.ok) {
                document.getElementById('updateTrackId').value = '';
                showToast();
            } else {
                alert('A csomag nem található!');
            }
        }
    </script>
</body>

</html>
